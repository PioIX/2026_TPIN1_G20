<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego / Notas</title>
    <link rel="stylesheet" href="styles.css">
    <script src="dom.js" defer></script>
    <script src="logic.js" defer></script>
</head>
<body>
    <div id="loginForm" class="auth-wrapper">
        <div class="login-container">
            <h2 id="titulo-form">Bienvenido</h2>
            
            <form>
                <div class="input-group" id="grupo-usuario" style="display: none;">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" placeholder="Elige tu nombre de usuario">
                </div>
                
                <div class="input-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="text" id="email" placeholder="Ingresa tu correo" required>
                </div>
                
                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="Ingresa tu contraseña" required>
                </div>
                
                <button type="button" id="btn-login" class="btn-login" onclick="handleLogin()">Iniciar Sesión</button>
                <button type="button" id="btn-registro" class="btn-login" onclick="handleRegister()" style="display: none;">Registrarse y Jugar</button>
            </form>
            
            <p class="toggle-auth" id="texto-toggle">¿No tienes cuenta? <a href="#" onclick="cambiarVista()">Regístrate aquí</a></p>
        </div>
    </div>

    <div id="notepad" style="display: none;">
        <h2 id="loggedUsername"></h2>
        
        <br>
        <button onclick="logout()" class="btn-login">Cerrar Sesión</button>
    </div>

    <script>
        function cambiarVista() {
            const grupoUsuario = document.getElementById('grupo-usuario');
            const btnLogin = document.getElementById('btn-login');
            const btnRegistro = document.getElementById('btn-registro');
            const tituloForm = document.getElementById('titulo-form');
            const textoToggle = document.getElementById('texto-toggle');

            if (grupoUsuario.style.display === 'none') {
                // Pasamos a vista de Registro
                grupoUsuario.style.display = 'block';
                btnLogin.style.display = 'none';
                btnRegistro.style.display = 'block';
                tituloForm.innerText = 'Crear Cuenta';
                textoToggle.innerHTML = '¿Ya tienes cuenta? <a href="#" onclick="cambiarVista()">Inicia sesión</a>';
            } else {
                // Volvemos a vista de Login
                grupoUsuario.style.display = 'none';
                btnLogin.style.display = 'block';
                btnRegistro.style.display = 'none';
                tituloForm.innerText = 'Bienvenido';
                textoToggle.innerHTML = '¿No tienes cuenta? <a href="#" onclick="cambiarVista()">Regístrate aquí</a>';
            }
        }
    </script>

    <div id="seccion-juego" style="display: none;">
    <div id="contenedor-principal">
        <header id="encabezado">
            <div class="puntaje">SCORE <span id="valor-puntaje">0</span></div>
            <div class="puntaje-alto">HIGHSCORE <span id="valor-puntaje-alto">0</span></div>
        </header>

        <main id="area-juego">
            <section class="tarjeta-jugador" id="jugador-izquierdo">
                <div class="contenido-jugador">
                    <div class="identificacion-jugador">
                        <div class="contenedor-bandera">
                            <img id="bandera-jugador1" src="" alt="Bandera" class="mini-bandera">
                        </div>
                        <h2 class="nombre-jugador" id="txt-jugador1">jugador1</h2>
                    </div>
                    <div class="seccion-valor">
                        <p class="etiqueta-valor">GOLES EN MUNDIALES</p>
                        <hr class="linea-divisoria">
                        <p class="valor-mercado" id="txt-cant1">0</p>
                    </div>
                </div>
            </section>

            <div id="medalla-vs">VS</div>

            <section class="tarjeta-jugador" id="jugador-derecho">
                <div class="contenido-jugador">
                    <div class="identificacion-jugador">
                        <div class="contenedor-bandera">
                            <img id="bandera-jugador2" src="" alt="Bandera" class="mini-bandera">
                        </div>
                        <h2 class="nombre-jugador" id="txt-jugador2">jugador2</h2>
                    </div>
                    <div class="contenedor-botones">
                        <button class="boton-juego boton-mayor">HIGHER △</button>
                        <button class="boton-juego boton-menor">LOWER ▽</button>
                    </div>
                </div>
            </section>
        </main>
    </div>
</div>

<script>
    // Función para cambiar de pantalla de forma limpia
    function iniciarJuego() {
        document.getElementById('seccion-login').style.display = 'none';
        document.getElementById('seccion-juego').style.display = 'block';
        console.log("Juego iniciado");
    }

    // --- Lógica del juego ---
    let currentscore = 0;
    let higherscore = 0;
    let jugador1 = "jugador1";
    let jugador2 = "jugador2";
    let cant1 = 0;
    
    let urlBandera1 = "https://upload.wikimedia.org/wikipedia/commons/0/0d/Color_negro.png"; 
    let urlBandera2 = "https://upload.wikimedia.org/wikipedia/commons/0/0d/Color_negro.png"; 

    function actualizarInterfaz() {
        document.getElementById("valor-puntaje").innerText = currentscore;
        document.getElementById("valor-puntaje-alto").innerText = higherscore;
        document.getElementById("txt-jugador1").innerText = jugador1;
        document.getElementById("txt-cant1").innerText = cant1;
        document.getElementById("txt-jugador2").innerText = jugador2;
        
        // NUEVO: Actualiza las banderas en la interfaz
        document.getElementById("bandera-jugador1").src = urlBandera1;
        document.getElementById("bandera-jugador2").src = urlBandera2;
    }

    actualizarInterfaz();
</script>
</body>
</html>
